{% extends 'award/base.html' %}

{% block content %}
<section class="media-page-header" style="background-color: var(--primary); padding: 80px 0 50px; text-align: center;">
    <div class="container">
        <h1 style="color: var(--gold); font-weight: 900; font-size: 2.5rem;">معرض الصور</h1>
        <p style="color: rgba(255,255,255,0.7); margin-top: 10px;">صور من فعاليات وأنشطة الجائزة</p>
    </div>
</section>

<section class="py-5" style="background-color: var(--bg-gray);">
    <div class="container">
        {% if photos %}
        <div class="row g-4">
            {% for photo in photos %}
            <div class="col-lg-4 col-md-6" data-aos="fade-up">
                <div class="photo-card" style="background: #fff; overflow: hidden; box-shadow: 0 2px 15px rgba(0,0,0,0.08); transition: transform 0.3s, box-shadow 0.3s; height: 380px; display: flex; flex-direction: column;">
                    <div style="height: 260px; overflow: hidden; flex-shrink: 0;">
                        {% if photo.image %}
                        <img src="{{ photo.image.url }}" alt="{{ photo.title }}" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s;">
                        {% endif %}
                    </div>
                    <div style="padding: 18px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                            <i class="fas fa-calendar-alt" style="color: var(--gold); font-size: 0.8rem;"></i>
                            <span style="color: #c0392b; font-size: 0.8rem; font-weight: 600;">{{ photo.created_at|date:"d-m-Y" }}</span>
                        </div>
                        <h4 style="color: var(--primary); font-weight: 800; font-size: 1rem; margin: 0;">{{ photo.title }}</h4>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-5">
            <i class="fas fa-images" style="font-size: 3rem; color: #ddd; margin-bottom: 15px;"></i>
            <p style="color: #999; font-size: 1.1rem;">لا توجد صور بعد</p>
        </div>
        {% endif %}
    </div>
</section>

<style>
    .photo-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.15) !important; }
    .photo-card:hover img { transform: scale(1.08); }
</style>
{% endblock %}
