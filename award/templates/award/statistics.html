{% extends 'award/base.html' %}

{% block content %}
<section class="media-page-header" style="background-color: var(--primary); padding: 80px 0 50px; text-align: center;">
    <div class="container">
        <h1 style="color: var(--gold); font-weight: 900; font-size: 2.5rem;">الإحصائيات</h1>
        <p style="color: rgba(255,255,255,0.7); margin-top: 10px;">أرقام وأرقام قياسية</p>
    </div>
</section>

<section class="py-5" style="background-color: var(--bg-gray);">
    <div class="container">
        <div class="row text-center g-4">
            <div class="col-md-4 mb-4" data-aos="fade-up">
                <div style="background: #fff; padding: 50px 30px; box-shadow: 0 2px 15px rgba(0,0,0,0.08);">
                    <i class="fas fa-school" style="font-size: 3rem; color: var(--gold); margin-bottom: 20px;"></i>
                    <h2 style="color: var(--primary); font-weight: 900; font-size: 3.5rem;">{{ total_submissions }}</h2>
                    <h6 style="color: #666; font-weight: 600; margin-top: 10px;">مدارس مشاركة</h6>
                </div>
            </div>
            <div class="col-md-4 mb-4" data-aos="fade-up" data-aos-delay="150">
                <div style="background: #fff; padding: 50px 30px; box-shadow: 0 2px 15px rgba(0,0,0,0.08);">
                    <i class="fas fa-users" style="font-size: 3rem; color: var(--gold); margin-bottom: 20px;"></i>
                    <h2 style="color: var(--primary); font-weight: 900; font-size: 3.5rem;">{{ accepted_submissions }}</h2>
                    <h6 style="color: #666; font-weight: 600; margin-top: 10px;">مشاركون متأهلون</h6>
                </div>
            </div>
            <div class="col-md-4 mb-4" data-aos="fade-up" data-aos-delay="300">
                <div style="background: #fff; padding: 50px 30px; box-shadow: 0 2px 15px rgba(0,0,0,0.08);">
                    <i class="fas fa-trophy" style="font-size: 3rem; color: var(--gold); margin-bottom: 20px;"></i>
                    <h2 style="color: var(--primary); font-weight: 900; font-size: 3.5rem;">3</h2>
                    <h6 style="color: #666; font-weight: 600; margin-top: 10px;">جوائز مرموقة</h6>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
