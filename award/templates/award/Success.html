{% extends 'award/base.html' %}

{% block content %}
<div class="container py-5 text-center" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div data-aos="zoom-in">
        <i class="fas fa-check-circle fa-5x mb-4" style="color: var(--gold);"></i>
        <h1 class="fw-bold mb-3" style="color: var(--primary);">{{ success_content.main_title }}</h1>
        <p class="lead text-muted mb-4">{{ success_content.sub_text }}</p>
        <a href="{% url 'home' %}" class="btn btn-gold px-5">{{ success_content.btn_text }}</a>
    </div>
</div>
{% endblock %}
